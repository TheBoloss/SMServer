services:
  smserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smserver
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env        # load CONNECTION_URL, API keys, etc.
    volumes:
      - ./logs:/app/logs
      - ./config.yml:/app/config.yml:ro
    ports:
      - "3000:3000"
